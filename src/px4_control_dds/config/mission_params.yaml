# micro-XRCE-DDS 全覆盖网格侦察任务参数
# 坐标系: PX4 NED (x=前/North, y=右/East, z=下, 负值=向上)
# 原点: 起飞点 (H 位置 world:10,4,0)
/mission_controller_dds:
  ros__parameters:
    # --- 基础飞行参数 ---
    takeoff_height: 5.0         # 巡航飞行高度 (m, NED z 负值)
    waypoint_tolerance: 0.5     # 航点到达容差 (m)
    takeoff_tolerance: 0.3      # 起飞到达容差 (m)
    hover_duration: 5.0         # (保留, 网格模式不使用悬停)
    control_frequency: 20.0     # 控制循环频率 (Hz), 必须 >2Hz
    max_error_count: 5          # 最大错误次数, 超过则中止任务
    waypoint_timeout: 120.0     # 单航点超时 (s)
    land_altitude: 0.15         # 着陆确认高度 (m, NED z > -0.15 认为已着陆)

    # --- 速度与加速度参数 ---
    sweep_speed: 0.8            # 区域内部遍历速度 (m/s)
    transit_speed: 2.0          # 区域之间中转速度 (m/s)
    return_speed: 3.0           # 返航速度 (m/s)
    max_acceleration: 0.2       # 最大加速度 (m/s²)

    # --- 网格全覆盖参数 ---
    grid_spacing: 1.0           # 网格间距 (m), 弓字形相邻 strip 间距
    sweep_passes: 2             # 每个区域弓字形折返次数 (strip 数量)
    sweep_margin_north: 1.0     # 长边界 (north) 内缩余量 (m)
    sweep_margin_east: 0.5      # 段边界 (east) 内缩余量 (m)
    long_boundary_inset: 1.0    # 首个长边界额外内缩 (m), 避免抵达区域时贴边飞行

    # 区域一 (投放区): Gazebo x:40~45, y:0~8
    #   NED 转换: north = world_y - 4, east = world_x - 10
    #   north ∈ [-4.0, 4.0], east ∈ [30.0, 35.0]
    area1_north_min: -4.0
    area1_north_max: 4.0
    area1_east_min: 30.0
    area1_east_max: 35.0
    area1_altitude: 2.0         # 区域一飞行高度 (m, NED z 负值 = 离地 2m)

    # 区域二 (侦察区): Gazebo x:65~70, y:0~8
    #   NED 转换: north = world_y - 4, east = world_x - 10
    #   north ∈ [-4.0, 4.0], east ∈ [55.0, 60.0]
    area2_north_min: -4.0
    area2_north_max: 4.0
    area2_east_min: 55.0
    area2_east_max: 60.0
    area2_altitude: 5.0         # 区域二飞行高度 (m, NED z 负值 = 离地 5m)
